services:
  shmarql:
    image: ghcr.io/epoz/shmarql:latest
    restart: unless-stopped
    environment:
      - "DEBUG=1"
      - "PROXY_HOST=http://mkdocs:8000"
      - "REDIS_HOST=redis"
      - "ENDPOINT=https://nfdi4culture.de/sparql"
    ports:
      - "8008:8000"
    volumes:
      - ./data:/data
      - ./site:/app/src/site
    depends_on:
      mkdocs:
        condition: service_completed_successfully
  mkdocs:
    image: ghcr.io/epoz/shmarql:latest
    restart: no
    entrypoint: uv run mkdocs build
    volumes:
      - ./docs:/app/src/docs
      - ./mkdocs.yml:/app/src/mkdocs.yml
      - ./site:/app/src/site
  redis:
    image: redis:alpine
    restart: unless-stopped
