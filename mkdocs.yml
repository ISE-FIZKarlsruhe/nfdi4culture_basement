site_name: NFDI4Culture Basement Laboratory
site_description: A datastory on what lies underneath the Kitchen
nav:
  - Introduction: "index.md"
  - SPARQL: "sparql.md"
  - Ontology: "ontology.md"
  - Data Sources: 
    - Overview: "datasources/index.md"
    - Documentation per feed: "datasources/notes.md"
    - Research Data Graph: "datasources/rdg.md"
  - Technologies:
      - Kitchen: "tech/kitchen.md"
      - IIIF CLIP: "tech/images.md"
      - Entity Resolution: "tech/entities.md"
      - LIDO: "tech/lido.md"
      - LODEON: "tech/lodeon.md"
  - TODO List: "todo.md"

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    primary: teal
    accent: pink
  features:
    - content.code.copy
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - navigation.top
    - header.autohide
    - content.code.annotate
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
markdown_extensions:
  - shmarql
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false

extra_javascript:
  - javascript/shmarql.js
  - javascript/plotly-3.6.0.min.js
